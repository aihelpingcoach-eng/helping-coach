<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="goldCenter" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="25%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#7B5E00"/>
    </radialGradient>
    <linearGradient id="goldFace1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#FFD700" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer sun glow -->
  <circle cx="256" cy="256" r="200" fill="url(#sunGlow)" filter="url(#blur)"/>

  <!-- Drop shadow -->
  <ellipse cx="256" cy="448" rx="110" ry="20" fill="url(#shadow)" filter="url(#blur)"/>

  <!-- Octagon disc — beveled bottom rim -->
  <polygon points="164,332 200,362 312,362 348,332 348,180 312,150 200,150 164,180"
           fill="#7B5E00" opacity="0.85"/>

  <!-- Octagon top face -->
  <polygon points="156,320 196,354 316,354 356,320 356,192 316,158 196,158 156,192"
           fill="url(#goldCenter)"/>

  <!-- Gold radial facets (8-pointed) -->
  <!-- Each facet as a triangle from center -->
  <polygon points="256,256 156,320 156,192" fill="url(#goldFace1)" opacity="0.4"/>
  <polygon points="256,256 196,158 316,158" fill="white" opacity="0.2"/>
  <polygon points="256,256 316,158 356,192" fill="url(#goldFace1)" opacity="0.3"/>
  <polygon points="256,256 356,192 356,320" fill="#B8860B" opacity="0.3"/>
  <polygon points="256,256 316,354 196,354" fill="#7B5E00" opacity="0.4"/>
  <polygon points="256,256 156,320 196,354" fill="#DAA520" opacity="0.35"/>

  <!-- Central sun burst highlight -->
  <circle cx="256" cy="256" r="55" fill="white" opacity="0.18"/>
  <circle cx="256" cy="256" r="25" fill="white" opacity="0.35"/>
  <circle cx="248" cy="245" r="10" fill="white" opacity="0.7"/>

  <!-- 8 radial light rays from center -->
  <g opacity="0.55" filter="url(#glow)">
    <line x1="256" y1="256" x2="256" y2="140" stroke="#FFD700" stroke-width="2"/>
    <line x1="256" y1="256" x2="340" y2="172" stroke="#FFD700" stroke-width="2"/>
    <line x1="256" y1="256" x2="370" y2="256" stroke="#FFD700" stroke-width="2"/>
    <line x1="256" y1="256" x2="340" y2="340" stroke="#FFD700" stroke-width="2"/>
    <line x1="256" y1="256" x2="256" y2="372" stroke="#FFD700" stroke-width="2"/>
    <line x1="256" y1="256" x2="172" y2="340" stroke="#FFD700" stroke-width="2"/>
    <line x1="256" y1="256" x2="142" y2="256" stroke="#FFD700" stroke-width="2"/>
    <line x1="256" y1="256" x2="172" y2="172" stroke="#FFD700" stroke-width="2"/>
  </g>

  <!-- Caustic light spots -->
  <circle cx="210" cy="190" r="6" fill="white" opacity="0.5" filter="url(#glow)"/>
  <circle cx="310" cy="180" r="4" fill="white" opacity="0.4" filter="url(#glow)"/>
  <circle cx="340" cy="280" r="5" fill="white" opacity="0.35" filter="url(#glow)"/>

  <!-- Top edge highlight -->
  <polyline points="196,158 316,158" stroke="white" stroke-width="3" opacity="0.6" fill="none"/>
  <polyline points="156,192 196,158" stroke="white" stroke-width="2" opacity="0.4" fill="none"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ironBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="40%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="ironTop" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="35%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="ironSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="brasa" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C2D12"/>
      <stop offset="50%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <radialGradient id="heatGlow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="blurSm"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="256" cy="440" rx="115" ry="22" fill="url(#shadow)" filter="url(#blur)"/>

  <!-- Heat glow underneath -->
  <ellipse cx="256" cy="380" rx="130" ry="60" fill="url(#heatGlow)" filter="url(#blurSm)"/>

  <!-- Ingot bottom/side face -->
  <path d="M148,340 L168,380 L344,380 L364,340 Z" fill="url(#ironSide)"/>
  <!-- Hot crack lines on side -->
  <path d="M200,340 L190,380" stroke="url(#brasa)" stroke-width="2" opacity="0.7"/>
  <path d="M280,340 L295,380" stroke="url(#brasa)" stroke-width="1.5" opacity="0.5"/>
  <path d="M320,340 L310,380" stroke="url(#brasa)" stroke-width="1" opacity="0.4"/>

  <!-- Ingot top face (slightly irregular edges for hand-forged look) -->
  <path d="M140,200 L152,160 L362,158 L372,200 L365,340 L145,342 Z"
        fill="url(#ironBase)"/>
  <!-- Top face lighter gradient -->
  <path d="M140,200 L152,160 L362,158 L372,200 L365,340 L145,342 Z"
        fill="url(#ironTop)" opacity="0.6"/>

  <!-- Forge crack veins on top -->
  <path d="M180,220 Q210,250 195,290" stroke="#F97316" stroke-width="2.5" fill="none" opacity="0.8" filter="url(#glow)"/>
  <path d="M180,220 Q185,235 175,250" stroke="#FCD34D" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M300,180 Q320,210 310,260" stroke="#EA580C" stroke-width="2" fill="none" opacity="0.7" filter="url(#glow)"/>
  <path d="M240,300 Q260,315 250,340" stroke="#F97316" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Surface shimmer (heat distortion lines) -->
  <line x1="152" y1="175" x2="362" y2="172" stroke="white" stroke-width="1" opacity="0.15"/>
  <line x1="148" y1="190" x2="370" y2="188" stroke="#F97316" stroke-width="0.5" opacity="0.2"/>

  <!-- Specular highlight -->
  <path d="M152,160 L260,158 L240,175 L145,178 Z" fill="white" opacity="0.12"/>

  <!-- Sparks -->
  <circle cx="310" cy="140" r="3" fill="#FCD34D" opacity="0.9" filter="url(#glow)"/>
  <circle cx="330" cy="125" r="2" fill="#FCD34D" opacity="0.7" filter="url(#glow)"/>
  <circle cx="295" cy="120" r="1.5" fill="#F97316" opacity="0.8" filter="url(#glow)"/>
  <circle cx="345" cy="150" r="2.5" fill="#FCD34D" opacity="0.6" filter="url(#glow)"/>
  <circle cx="170" cy="135" r="2" fill="#FCD34D" opacity="0.5" filter="url(#glow)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="emeraldCore" cx="38%" cy="33%" r="68%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="25%" stop-color="#10B981"/>
      <stop offset="55%" stop-color="#065F46"/>
      <stop offset="85%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#011A14"/>
    </radialGradient>
    <radialGradient id="emeraldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#059669" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emeraldFacetL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <linearGradient id="emeraldFacetD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#011A14"/>
    </linearGradient>
    <linearGradient id="emeraldStep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#022C22" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="innerLight" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#10B981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#065F46" stop-opacity="0"/>
    </radialGradient>
    <!-- Garden (needle inclusions) -->
    <linearGradient id="inclusion1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6EE7B7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001A0A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep forest green ambient glow -->
  <circle cx="256" cy="265" r="200" fill="url(#emeraldGlow)" filter="url(#blur)"/>

  <!-- Drop shadow -->
  <ellipse cx="256" cy="448" rx="115" ry="20" fill="url(#shadow)" filter="url(#blur)"/>

  <!-- Emerald cut — bottom rim -->
  <rect x="136" y="350" width="240" height="28" rx="4" fill="#011A14" opacity="0.85"/>

  <!-- Side faces -->
  <polygon points="136,350 136,182 150,170 150,338 136,350" fill="url(#emeraldFacetD)" opacity="0.8"/>
  <polygon points="376,350 376,182 362,170 362,338 376,350" fill="url(#emeraldFacetD)" opacity="0.6"/>

  <!-- Main stone — emerald cut rectangular -->
  <rect x="150" y="158" width="212" height="200" rx="6" fill="url(#emeraldCore)"/>

  <!-- Inner warm light -->
  <rect x="150" y="158" width="212" height="200" rx="6" fill="url(#innerLight)"/>

  <!-- Stepped facets — classic emerald cut -->
  <rect x="160" y="166" width="192" height="184" rx="4" fill="none" stroke="#34D399" stroke-width="1.5" opacity="0.35"/>
  <rect x="174" y="178" width="164" height="160" rx="3" fill="url(#emeraldStep)"/>
  <rect x="174" y="178" width="164" height="160" rx="3" fill="none" stroke="#6EE7B7" stroke-width="1" opacity="0.4"/>
  <rect x="194" y="196" width="124" height="124" rx="2" fill="none" stroke="#34D399" stroke-width="0.8" opacity="0.3"/>
  <!-- Table -->
  <rect x="212" y="212" width="88" height="90" rx="2" fill="#10B981" opacity="0.2"/>

  <!-- Natural inclusions (garden) — needle-like -->
  <line x1="195" y1="200" x2="225" y2="260" stroke="url(#inclusion1)" stroke-width="1.5"/>
  <line x1="280" y1="185" x2="310" y2="240" stroke="url(#inclusion1)" stroke-width="1"/>
  <line x1="240" y1="270" x2="265" y2="330" stroke="url(#inclusion1)" stroke-width="0.8"/>
  <line x1="175" y1="270" x2="200" y2="310" stroke="url(#inclusion1)" stroke-width="0.7"/>
  <line x1="315" y1="260" x2="340" y2="310" stroke="url(#inclusion1)" stroke-width="0.8"/>

  <!-- Corner facets -->
  <polygon points="150,158 174,178 174,168 162,158" fill="white" opacity="0.22"/>
  <polygon points="362,158 338,178 338,168 350,158" fill="white" opacity="0.15"/>
  <polygon points="150,358 174,338 174,350 162,358" fill="#065F46" opacity="0.8"/>
  <polygon points="362,358 338,338 338,350 350,358" fill="#065F46" opacity="0.7"/>

  <!-- Primary specular highlight -->
  <ellipse cx="193" cy="188" rx="24" ry="15" fill="white" opacity="0.7" filter="url(#glowSm)"/>
  <ellipse cx="189" cy="183" rx="11" ry="7" fill="white" opacity="0.95"/>

  <!-- Gold-white dots at facet intersections -->
  <circle cx="356" cy="178" r="5" fill="white" opacity="0.7" filter="url(#goldGlow)"/>
  <circle cx="160" cy="350" r="4" fill="#6EE7B7" opacity="0.7" filter="url(#goldGlow)"/>
  <circle cx="356" cy="350" r="4" fill="#6EE7B7" opacity="0.6" filter="url(#goldGlow)"/>
  <circle cx="338" cy="260" r="3" fill="#A7F3D0" opacity="0.5" filter="url(#goldGlow)"/>
  <circle cx="174" cy="260" r="3" fill="#A7F3D0" opacity="0.5" filter="url(#goldGlow)"/>

  <!-- Top edge highlight -->
  <line x1="150" y1="158" x2="362" y2="158" stroke="white" stroke-width="2.5" opacity="0.5"/>
</svg>

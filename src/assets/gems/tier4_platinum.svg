<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="platCenter" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#E8F4FD"/>
      <stop offset="50%" stop-color="#B0C4DE"/>
      <stop offset="80%" stop-color="#7890A8"/>
      <stop offset="100%" stop-color="#4A6080"/>
    </radialGradient>
    <linearGradient id="platFacetL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DDEEFF"/>
      <stop offset="100%" stop-color="#5A7A9A"/>
    </linearGradient>
    <linearGradient id="platFacetD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8AACCC"/>
      <stop offset="100%" stop-color="#2A4A6A"/>
    </linearGradient>
    <radialGradient id="iceGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B0E0FF" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#7EB8D8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#B0E0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer cold glow -->
  <ellipse cx="256" cy="256" rx="190" ry="180" fill="url(#iceGlow)" filter="url(#blur)"/>

  <!-- Drop shadow -->
  <ellipse cx="256" cy="445" rx="105" ry="18" fill="url(#shadow)" filter="url(#blur)"/>

  <!-- Oval brilliant cut — bottom pavilion -->
  <ellipse cx="256" cy="350" rx="120" ry="30" fill="#2A4A6A" opacity="0.7"/>

  <!-- Pavilion facets (bottom triangular sections) -->
  <polygon points="256,320 136,300 176,370 256,370" fill="url(#platFacetD)" opacity="0.6"/>
  <polygon points="256,320 376,300 336,370 256,370" fill="url(#platFacetD)" opacity="0.5"/>

  <!-- Crown (upper oval gem) -->
  <ellipse cx="256" cy="260" rx="130" ry="95" fill="url(#platCenter)"/>

  <!-- Table facet (central octagon) -->
  <ellipse cx="256" cy="248" rx="68" ry="48" fill="white" opacity="0.3"/>
  <ellipse cx="256" cy="248" rx="68" ry="48" fill="url(#platFacetL)" opacity="0.4"/>

  <!-- Star facets radiating from table -->
  <polygon points="256,248 188,200 256,190 324,200" fill="white" opacity="0.25"/>
  <polygon points="256,248 384,240 356,290 256,310" fill="url(#platFacetD)" opacity="0.3"/>
  <polygon points="256,248 128,240 156,290 256,310" fill="url(#platFacetL)" opacity="0.3"/>
  <polygon points="256,248 240,140 256,155 272,140" fill="white" opacity="0.35"/>

  <!-- Girdle highlight line -->
  <ellipse cx="256" cy="310" rx="128" ry="18" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>

  <!-- Primary specular highlight -->
  <ellipse cx="230" cy="225" rx="30" ry="20" fill="white" opacity="0.65" filter="url(#glow)"/>
  <ellipse cx="222" cy="218" rx="14" ry="9" fill="white" opacity="0.9"/>

  <!-- Sky reflection micro-dots in facets -->
  <circle cx="320" cy="210" r="5" fill="#B0E0FF" opacity="0.7" filter="url(#glow)"/>
  <circle cx="350" cy="255" r="3.5" fill="#DDEEFF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="175" cy="290" r="4" fill="#B0E0FF" opacity="0.5" filter="url(#glow)"/>
  <circle cx="295" cy="305" r="3" fill="white" opacity="0.5" filter="url(#glow)"/>

  <!-- Top edge highlight -->
  <path d="M 200,170 Q 256,155 312,170" stroke="white" stroke-width="2" fill="none" opacity="0.55"/>
</svg>

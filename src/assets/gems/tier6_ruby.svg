<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="rubyCore" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="30%" stop-color="#DC2626"/>
      <stop offset="65%" stop-color="#991B1B"/>
      <stop offset="100%" stop-color="#450A0A"/>
    </radialGradient>
    <radialGradient id="rubyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#DC2626" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rubyFacetL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A8A"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </linearGradient>
    <linearGradient id="rubyFacetD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F1D1D"/>
      <stop offset="100%" stop-color="#1A0000"/>
    </linearGradient>
    <linearGradient id="rubyStep1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7F1D1D" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="innerFire" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FF4444" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#CC0000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#660000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#400000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep red ambient glow -->
  <circle cx="256" cy="270" r="200" fill="url(#rubyGlow)" filter="url(#blur)"/>

  <!-- Drop shadow (red-tinted) -->
  <ellipse cx="256" cy="445" rx="115" ry="20" fill="url(#shadow)" filter="url(#blur)"/>

  <!-- Emerald cut rectangle — bottom rim -->
  <rect x="136" y="348" width="240" height="30" rx="4" fill="#450A0A" opacity="0.8"/>

  <!-- Emerald cut — stepped side facets -->
  <polygon points="136,348 136,180 148,168 148,336 136,348" fill="url(#rubyFacetD)" opacity="0.7"/>
  <polygon points="376,348 376,180 364,168 364,336 376,348" fill="url(#rubyFacetD)" opacity="0.5"/>

  <!-- Main stone body — emerald cut rectangular -->
  <rect x="148" y="155" width="216" height="200" rx="6" fill="url(#rubyCore)"/>

  <!-- Inner fire glow -->
  <rect x="148" y="155" width="216" height="200" rx="6" fill="url(#innerFire)"/>

  <!-- Stepped facets — emerald cut pattern -->
  <!-- Step 1 outer frame -->
  <rect x="158" y="163" width="196" height="184" rx="4" fill="none" stroke="#FF6B6B" stroke-width="1.5" opacity="0.4"/>
  <!-- Step 2 -->
  <rect x="172" y="175" width="168" height="160" rx="3" fill="url(#rubyStep1)"/>
  <rect x="172" y="175" width="168" height="160" rx="3" fill="none" stroke="#FF8A8A" stroke-width="1" opacity="0.5"/>
  <!-- Step 3 inner -->
  <rect x="192" y="193" width="128" height="124" rx="2" fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.35"/>
  <!-- Table (center) -->
  <rect x="210" y="208" width="92" height="94" rx="2" fill="#FF4444" opacity="0.25"/>

  <!-- Corner triangle facets -->
  <polygon points="148,155 172,175 172,163 158,155" fill="white" opacity="0.2"/>
  <polygon points="364,155 340,175 340,163 354,155" fill="white" opacity="0.15"/>
  <polygon points="148,355 172,335 172,347 158,355" fill="#7F1D1D" opacity="0.7"/>
  <polygon points="364,355 340,335 340,347 354,355" fill="#7F1D1D" opacity="0.6"/>

  <!-- Primary specular highlight top-left corner -->
  <ellipse cx="195" cy="188" rx="22" ry="14" fill="white" opacity="0.75" filter="url(#glowSm)"/>
  <ellipse cx="191" cy="184" rx="10" ry="6" fill="white" opacity="0.95"/>

  <!-- Corner specular dots -->
  <circle cx="354" cy="175" r="5" fill="white" opacity="0.65" filter="url(#glowSm)"/>
  <circle cx="155" cy="348" r="4" fill="#FF6B6B" opacity="0.7" filter="url(#glowSm)"/>
  <circle cx="358" cy="348" r="4" fill="#FF6B6B" opacity="0.6" filter="url(#glowSm)"/>

  <!-- Top edge highlight -->
  <line x1="148" y1="155" x2="364" y2="155" stroke="white" stroke-width="2.5" opacity="0.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="sapphireCore" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="20%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#1D4ED8"/>
      <stop offset="75%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <radialGradient id="sapphireGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kingdomAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4338CA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sapphFacetL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="sapphFacetD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="oceanDepth" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <!-- Star asterism rays -->
    <linearGradient id="starRay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A0A2A" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Kingdom aura (blue-violet outer ring) -->
  <circle cx="256" cy="256" r="215" fill="url(#kingdomAura)" filter="url(#blur)"/>

  <!-- Deep royal glow -->
  <circle cx="256" cy="265" r="195" fill="url(#sapphireGlow)" filter="url(#blur)"/>

  <!-- Drop shadow (deep blue-black) -->
  <ellipse cx="256" cy="448" rx="118" ry="21" fill="url(#shadow)" filter="url(#blur)"/>

  <!-- Oval brilliant — pavilion (bottom) -->
  <!-- Main pavilion triangles -->
  <polygon points="256,390 128,300 184,390" fill="url(#sapphFacetD)" opacity="0.7"/>
  <polygon points="256,390 384,300 328,390" fill="url(#sapphFacetD)" opacity="0.6"/>
  <polygon points="256,390 128,300 384,300" fill="#1E3A8A" opacity="0.5"/>

  <!-- Crown (upper oval) — main gem body -->
  <ellipse cx="256" cy="255" rx="133" ry="97" fill="url(#sapphireCore)"/>

  <!-- Ocean depth overlay -->
  <ellipse cx="256" cy="255" rx="133" ry="97" fill="url(#oceanDepth)"/>

  <!-- Star facet planes -->
  <polygon points="256,255 123,245 190,180 256,158" fill="url(#sapphFacetL)" opacity="0.35"/>
  <polygon points="256,255 256,158 322,180 389,245" fill="#2563EB" opacity="0.25"/>
  <polygon points="256,255 389,245 370,310 256,345" fill="#1E3A8A" opacity="0.35"/>
  <polygon points="256,255 123,245 142,310 256,345" fill="url(#sapphFacetD)" opacity="0.35"/>

  <!-- Table (central octagon) -->
  <polygon points="196,218 220,168 292,168 316,218 292,298 220,298"
           fill="#2563EB" opacity="0.35"/>
  <polygon points="196,218 220,168 292,168 316,218 292,298 220,298"
           fill="white" opacity="0.08"/>

  <!-- Girdle edge highlight -->
  <ellipse cx="256" cy="310" rx="131" ry="17" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- ★ Asterism star — 6-pointed white star floating in center -->
  <!-- Ray 1: vertical -->
  <rect x="253" y="155" width="6" height="200" rx="3"
        fill="url(#starRay)" opacity="0.85" filter="url(#starGlow)"/>
  <!-- Ray 2: 60° -->
  <rect x="253" y="155" width="6" height="200" rx="3"
        fill="url(#starRay)" opacity="0.75" filter="url(#starGlow)"
        transform="rotate(60, 256, 255)"/>
  <!-- Ray 3: 120° -->
  <rect x="253" y="155" width="6" height="200" rx="3"
        fill="url(#starRay)" opacity="0.75" filter="url(#starGlow)"
        transform="rotate(120, 256, 255)"/>

  <!-- Star center bright point -->
  <circle cx="256" cy="255" r="10" fill="white" opacity="0.95" filter="url(#starGlow)"/>
  <circle cx="256" cy="255" r="5" fill="white" opacity="1"/>

  <!-- Primary specular highlight crown -->
  <ellipse cx="220" cy="205" rx="28" ry="18" fill="white" opacity="0.68" filter="url(#glowSm)"/>
  <ellipse cx="215" cy="200" rx="13" ry="8" fill="white" opacity="0.92"/>

  <!-- Facet corner sparkles -->
  <circle cx="190" cy="182" r="5" fill="white" opacity="0.8" filter="url(#glowSm)"/>
  <circle cx="320" cy="180" r="4.5" fill="#93C5FD" opacity="0.8" filter="url(#glowSm)"/>
  <circle cx="383" cy="248" r="4" fill="#818CF8" opacity="0.7" filter="url(#glowSm)"/>
  <circle cx="128" cy="248" r="4" fill="#60A5FA" opacity="0.7" filter="url(#glowSm)"/>
  <circle cx="295" cy="298" r="3.5" fill="white" opacity="0.5" filter="url(#glowSm)"/>
  <circle cx="218" cy="298" r="3.5" fill="white" opacity="0.5" filter="url(#glowSm)"/>

  <!-- Top edge highlight -->
  <path d="M 200,165 Q 256,148 312,165" stroke="white" stroke-width="2.5" fill="none" opacity="0.55"/>
</svg>

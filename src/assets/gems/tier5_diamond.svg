<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="diamondCore" cx="42%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="15%" stop-color="#F0FAFF"/>
      <stop offset="40%" stop-color="rgba(200,240,255,0.5)"/>
      <stop offset="70%" stop-color="rgba(160,200,240,0.3)"/>
      <stop offset="100%" stop-color="rgba(100,150,200,0.2)"/>
    </radialGradient>
    <!-- Prismatic rainbow facets -->
    <linearGradient id="prismRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="prismGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4ADE80" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="prismBlue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="prismViolet" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="crystalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0F4FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer crystal glow -->
  <circle cx="256" cy="256" r="195" fill="url(#crystalGlow)" filter="url(#blur)"/>

  <!-- Rainbow caustic rings on background -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="#4ADE80" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#60A5FA" stroke-width="1" opacity="0.15"/>

  <!-- Drop shadow -->
  <ellipse cx="256" cy="448" rx="108" ry="18" fill="url(#shadow)" filter="url(#blur)"/>

  <!-- Round brilliant — pavilion bottom -->
  <polygon points="256,380 136,295 376,295" fill="rgba(150,200,255,0.2)"/>
  <polygon points="256,380 136,295 196,380" fill="rgba(100,150,220,0.15)"/>
  <polygon points="256,380 376,295 316,380" fill="rgba(100,150,220,0.15)"/>

  <!-- Crown facets — main diamond shape -->
  <!-- Star facets (8 kite shapes) -->
  <polygon points="256,145 136,240 196,240 256,165" fill="url(#prismBlue)" opacity="0.5"/>
  <polygon points="256,145 376,240 316,240 256,165" fill="url(#prismRed)" opacity="0.5"/>
  <polygon points="136,240 136,295 196,270 196,240" fill="url(#prismGreen)" opacity="0.4"/>
  <polygon points="376,240 376,295 316,270 316,240" fill="url(#prismViolet)" opacity="0.4"/>
  <polygon points="196,240 316,240 316,270 196,270" fill="rgba(255,255,255,0.25)"/>

  <!-- Table (central flat hexagon) — frozen light -->
  <polygon points="196,205 222,145 290,145 316,205 290,265 222,265"
           fill="url(#diamondCore)"/>
  <polygon points="196,205 222,145 290,145 316,205 290,265 222,265"
           fill="white" opacity="0.15"/>

  <!-- Prismatic flare facets overlaid -->
  <polygon points="222,145 256,165 290,145" fill="white" opacity="0.6" filter="url(#glowSm)"/>
  <polygon points="196,205 222,145 210,200" fill="#60A5FA" opacity="0.35"/>
  <polygon points="316,205 290,145 302,200" fill="#FF6B6B" opacity="0.35"/>
  <polygon points="196,265 222,265 210,300" fill="#4ADE80" opacity="0.3"/>
  <polygon points="316,265 290,265 302,300" fill="#C084FC" opacity="0.3"/>

  <!-- Central table white flash -->
  <ellipse cx="248" cy="205" rx="26" ry="18" fill="white" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="244" cy="200" rx="12" ry="8" fill="white" opacity="1"/>

  <!-- Spectral micro-flashes on facet intersections -->
  <circle cx="222" cy="145" r="4" fill="#FF6B6B" opacity="0.9" filter="url(#glowSm)"/>
  <circle cx="290" cy="145" r="4" fill="#4ADE80" opacity="0.9" filter="url(#glowSm)"/>
  <circle cx="196" cy="205" r="3.5" fill="#60A5FA" opacity="0.9" filter="url(#glowSm)"/>
  <circle cx="316" cy="205" r="3.5" fill="#C084FC" opacity="0.9" filter="url(#glowSm)"/>
  <circle cx="196" cy="265" r="3" fill="#FDE68A" opacity="0.9" filter="url(#glowSm)"/>
  <circle cx="316" cy="265" r="3" fill="#60A5FA" opacity="0.9" filter="url(#glowSm)"/>

  <!-- Girdle edge highlight -->
  <polygon points="136,240 196,240 196,270 136,295" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <polygon points="376,240 316,240 316,270 376,295" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>

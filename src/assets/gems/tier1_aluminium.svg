<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Brushed metal gradient -->
    <linearGradient id="metalBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="30%" stop-color="#B0B8C8"/>
      <stop offset="60%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    <!-- Top face lighter -->
    <linearGradient id="metalTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="50%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <!-- Side face darker -->
    <linearGradient id="metalSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <!-- Brushed line pattern -->
    <pattern id="brushed" x="0" y="0" width="4" height="512" patternUnits="userSpaceOnUse">
      <rect width="1" height="512" fill="rgba(255,255,255,0.07)"/>
      <rect x="2" width="1" height="512" fill="rgba(0,0,0,0.05)"/>
    </pattern>
    <!-- Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#94A3B8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#64748B" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="256" cy="440" rx="120" ry="24" fill="url(#shadow)" filter="url(#blur)"/>

  <!-- Hexagon bottom face (3D depth) -->
  <polygon points="156,300 186,345 326,345 356,300 326,255 186,255"
           fill="url(#metalSide)" opacity="0.8"/>

  <!-- Hexagon top face -->
  <polygon points="146,270 186,210 326,210 366,270 326,330 186,330"
           fill="url(#metalBase)"/>
  <!-- Brushed texture overlay -->
  <polygon points="146,270 186,210 326,210 366,270 326,330 186,330"
           fill="url(#brushed)" opacity="0.8"/>
  <!-- Top face gradient overlay -->
  <polygon points="146,270 186,210 326,210 366,270 326,330 186,330"
           fill="url(#metalTop)" opacity="0.5"/>

  <!-- Specular highlight edge top-left -->
  <polygon points="146,270 186,210 230,210 190,270"
           fill="white" opacity="0.25"/>

  <!-- Inner glow -->
  <ellipse cx="256" cy="270" rx="80" ry="50" fill="url(#glow)"/>

  <!-- Sharp highlight line -->
  <line x1="186" y1="210" x2="326" y2="210" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="146" y1="270" x2="186" y2="210" stroke="white" stroke-width="1.5" opacity="0.4"/>
</svg>
